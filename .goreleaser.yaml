# GoReleaser config — https://goreleaser.com
# Cut a release by pushing a tag:  git tag v0.7.0 && git push origin v0.7.0
version: 2

project_name: orchestra

before:
  hooks:
    - go mod tidy

builds:
  - id: orchestra
    main: ./cmd/orchestra
    binary: orchestra
    env:
      - CGO_ENABLED=0 # pure-Go (modernc sqlite) → no C toolchain needed
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64 # skip until there's demand; keeps the matrix lean
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    ids:
      - orchestra
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge "

release:
  github:
    owner: crossben
    name: orchestra-code
  draft: false
  prerelease: auto
  name_template: "Orchestra {{ .Tag }}"

# Homebrew (macOS/Linux):  brew install crossben/tap/orchestra
# Requires a `crossben/homebrew-tap` repo and a PAT in the TAP_GITHUB_TOKEN
# secret. Without the token, the formula is generated but not pushed.
brews:
  - name: orchestra
    repository:
      owner: crossben
      name: homebrew-tap
      token: "{{ index .Env \"TAP_GITHUB_TOKEN\" }}"
    directory: Formula
    homepage: "https://github.com/crossben/orchestra-code"
    description: "The operating system for AI coding agents"
    license: "MIT"
    skip_upload: '{{ if eq (index .Env "TAP_GITHUB_TOKEN") "" }}true{{ else }}false{{ end }}'
    install: |
      bin.install "orchestra"
    test: |
      system "#{bin}/orchestra", "--version"

# Scoop (Windows):  scoop bucket add orchestra https://github.com/crossben/scoop-bucket; scoop install orchestra
# Requires a `crossben/scoop-bucket` repo and the same TAP_GITHUB_TOKEN secret.
scoops:
  - name: orchestra
    repository:
      owner: crossben
      name: scoop-bucket
      token: "{{ index .Env \"TAP_GITHUB_TOKEN\" }}"
    homepage: "https://github.com/crossben/orchestra-code"
    description: "The operating system for AI coding agents"
    license: MIT
    skip_upload: '{{ if eq (index .Env "TAP_GITHUB_TOKEN") "" }}true{{ else }}false{{ end }}'
